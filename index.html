<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Колесо удачи — Herbion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <svg class="plant plant--tl" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 230C100 230 60 180 50 130C40 80 70 30 100 10" stroke="#4a6741" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <path d="M100 180C85 160 55 150 30 155" stroke="#4a6741" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <path d="M100 140C120 125 155 120 175 130" stroke="#4a6741" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <ellipse cx="28" cy="153" rx="18" ry="10" transform="rotate(-30 28 153)" fill="#6b8562" opacity="0.25"/>
      <ellipse cx="175" cy="128" rx="20" ry="11" transform="rotate(25 175 128)" fill="#6b8562" opacity="0.22"/>
      <ellipse cx="62" cy="95" rx="16" ry="9" transform="rotate(-50 62 95)" fill="#4a6741" opacity="0.2"/>
      <ellipse cx="130" cy="70" rx="18" ry="10" transform="rotate(40 130 70)" fill="#4a6741" opacity="0.18"/>
    </svg>
    <svg class="plant plant--tr" viewBox="0 0 180 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M90 210C90 210 120 160 130 110C140 60 110 20 85 5" stroke="#3d5636" stroke-width="2" stroke-linecap="round" opacity="0.32"/>
      <path d="M90 160C105 145 140 135 160 140" stroke="#3d5636" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>
      <ellipse cx="158" cy="138" rx="17" ry="9" transform="rotate(35 158 138)" fill="#4a6741" opacity="0.22"/>
      <ellipse cx="108" cy="55" rx="15" ry="8" transform="rotate(55 108 55)" fill="#6b8562" opacity="0.2"/>
    </svg>
    <svg class="plant plant--bl" viewBox="0 0 220 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 180C60 160 100 120 110 70C115 40 90 15 60 5" stroke="#4a6741" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <path d="M60 120C80 110 110 115 130 130" stroke="#4a6741" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
      <ellipse cx="132" cy="128" rx="19" ry="10" transform="rotate(20 132 128)" fill="#6b8562" opacity="0.22"/>
      <ellipse cx="55" cy="18" rx="14" ry="8" transform="rotate(-20 55 18)" fill="#4a6741" opacity="0.18"/>
    </svg>
    <svg class="plant plant--br" viewBox="0 0 200 210" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M180 190C140 170 90 130 80 80C75 50 100 20 130 8" stroke="#3d5636" stroke-width="2" stroke-linecap="round" opacity="0.32"/>
      <path d="M120 100C100 90 70 95 50 110" stroke="#3d5636" stroke-width="1.5" stroke-linecap="round" opacity="0.26"/>
      <ellipse cx="48" cy="108" rx="16" ry="9" transform="rotate(-25 48 108)" fill="#4a6741" opacity="0.2"/>
      <ellipse cx="128" cy="12" rx="17" ry="9" transform="rotate(30 128 12)" fill="#6b8562" opacity="0.18"/>
    </svg>
    <div class="page-bg__blob page-bg__blob--1"></div>
    <div class="page-bg__blob page-bg__blob--2"></div>
  </div>

  <header class="site-header">
    <a href="#" class="logo" aria-label="Herbion — на главную">
      <span class="logo__mark" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C8 7 5 10 5 14c0 3.3 2.7 6 6 6h2c3.3 0 6-2.7 6-6 0-4-3-7-7-11z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 8v8M9 11l3-2 3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="logo__name">Herbion</span>
    </a>
  </header>

  <main class="game">
    <div class="game__intro">
      <span class="tag">
        <svg class="tag__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3C8 7 5 10 5 14c0 3.3 2.7 6 6 6h2c3.3 0 6-2.7 6-6 0-4-3-7-7-11z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Сила растений — ваш подарок
      </span>
      <h1 class="game__title">Крутите <em>колесо</em> удачи</h1>
      <p class="game__subtitle">Получите скидку, бонус или подарок от Herbion — натуральной косметики для вашей кожи</p>
    </div>

    <section class="wheel-section" aria-label="Колесо призов">
      <div class="wheel-wrapper">
        <div class="wheel-pointer" aria-hidden="true"></div>
        <div class="wheel-ring" aria-hidden="true"></div>
        <canvas id="wheelCanvas" class="wheel-canvas" width="460" height="460" role="img" aria-label="Колесо с призами"></canvas>
        <button type="button" class="wheel-center-btn" id="spinBtn" aria-label="Крутить колесо">
          <span class="wheel-center-btn__text">Крутить</span>
          <svg class="wheel-center-btn__arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <p class="game__hint" id="gameHint">Один подарок на участника · нажмите «Крутить»</p>
  </main>

  <div class="result-overlay" id="resultOverlay" hidden aria-hidden="true">
    <div class="result-modal" role="dialog" aria-labelledby="resultTitle" aria-modal="true">
      <button type="button" class="result-modal__close" id="closeBtn" aria-label="Закрыть">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <p class="result-modal__label">Ваш приз</p>
      <h2 class="result-modal__title" id="resultTitle"></h2>
      <p class="result-modal__desc" id="resultDesc"></p>
      <div class="result-modal__code" id="resultCodeWrap" hidden>
        <span class="result-modal__code-label">Промокод</span>
        <code class="result-modal__code-value" id="resultCode"></code>
      </div>
      <div class="result-modal__actions">
        <button type="button" class="btn btn--primary" id="retryBtn">
          Крутить ещё раз
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button type="button" class="btn btn--secondary" id="closeBtnAlt">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
